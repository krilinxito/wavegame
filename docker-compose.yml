services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: wavedev
      MARIADB_DATABASE: wave_game
      MARIADB_USER: wave
      MARIADB_PASSWORD: wavedev
    ports:
      - "3306:3306"
    volumes:
      - wave_db_data:/var/lib/mysql
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backend/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  wave_db_data:
